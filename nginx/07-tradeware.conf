# 1. Redirect all HTTP traffic to HTTPS smoothly
server {
    listen 80;
    server_name tradeware.softcoretech.in;

    # Keep Certbot renewal route accessible over HTTP
    location ~ /.well-known/acme-challenge {
        root /var/www/html;
        allow all;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Main Secure HTTPS Server block
server {
    listen 443 ssl;
    server_name tradeware.softcoretech.in;

    # SSL Key paths matching your Certbot output
    ssl_certificate /etc/letsencrypt/live/tradeware.softcoretech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tradeware.softcoretech.in/privkey.pem;

    # Performance and security configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Point to the location inside your Docker container volume
    root /usr/share/nginx/html/tradeware;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle assets caching for faster performance
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Logs for tracking and debugging
    access_log /var/log/nginx/tradeware_access.log;
    error_log /var/log/nginx/tradeware_error.log;
}